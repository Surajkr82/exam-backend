spring.datasource.name=exam
spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
server.port=${PORT:8080}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# AI provider configuration (Servam/OpenAI-compatible)
ai.base-url=${AI_BASE_URL:https://api.sarvam.ai}
ai.chat-completions-path=${AI_CHAT_PATH:/v1/chat/completions}
ai.model=${AI_MODEL:sarvam-m}
ai.auth.header=${AI_AUTH_HEADER:Authorization}
ai.auth.scheme=${AI_AUTH_SCHEME:Bearer}
ai.api.key=${SERVAM_API_KEY:${OPENAI_API_KEY:}}
